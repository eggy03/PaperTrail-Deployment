#file: noinspection SpellCheckingInspection
services:

  postgres:
    container_name: papertrail-postgres
    image: postgres:18.3-alpine3.23
    mem_limit: 512m
    restart: unless-stopped
    environment:
      POSTGRES_DB: papertrail
      POSTGRES_USER: defaultdb
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - papertrail_postgres_data:/var/lib/postgresql
    networks:
      - papertrail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defaultdb -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  valkey:
    container_name: papertrail-valkey
    image: valkey/valkey:9.0.3-alpine3.23
    mem_limit: 512m
    restart: unless-stopped
    environment:
      CACHE_PASSWORD: ${CACHE_PASSWORD}
    volumes:
      - papertrail_valkey_data:/data
    networks:
      - papertrail-network
    command:
      - valkey-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "yes"
      - --port
      - "6379"
      - --dir
      - /data
      - --maxmemory
      - 384mb
      - --maxmemory-policy
      - allkeys-lru
      - --maxmemory-samples
      - "5"
      - --maxmemory-eviction-tenacity
      - "10"
      - --appendonly
      - "yes"
      - --appendfilename
      - "appendonly.aof"
      - --appenddirname
      - "appendonlydir"
      - --appendfsync
      - everysec
      - --save
      - 20 1
      - --requirepass
      - ${CACHE_PASSWORD}
    healthcheck:
      test: [ "CMD", "valkey-cli", "-a", "$$CACHE_PASSWORD", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  papertrail-api:
    container_name: papertrail-api
    image: ghcr.io/eggy03/papertrail-api:latest-native
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/papertrail
      DB_USERNAME: defaultdb
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://default:${CACHE_PASSWORD}@valkey:6379
    networks:
      - papertrail-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  papertrail-bot:
    container_name: papertrail-bot
    image: ghcr.io/eggy03/papertrail-bot:latest
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      papertrail-api:
        condition: service_healthy
    environment:
      TOKEN: ${TOKEN}
      API_URL: http://papertrail-api:8080
    networks:
      - papertrail-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  papertrail_postgres_data:
  papertrail_valkey_data:

networks:
  papertrail-network: