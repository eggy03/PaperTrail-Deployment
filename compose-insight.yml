#file: noinspection SpellCheckingInspection
services:

  pgAdmin:
    image: dpage/pgadmin4:latest
    container_name: papertrail-pgadmin
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - papertrail-network
    ports:
      - "127.0.0.1:5050:80"

  valkey_insight:
    image: redis/redisinsight:latest
    container_name: papertrail-valkey-insight
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - papertrail-network
    ports:
      - "127.0.0.1:5540:5540"

  dozzle:
    image: amir20/dozzle:latest
    container_name: papertrail-dozzle
    mem_limit: 512m
    restart: unless-stopped
    volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - papertrail-network
    ports:
        - "127.0.0.1:9090:8080"

volumes:
  pgadmin_data: