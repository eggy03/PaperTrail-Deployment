#file: noinspection SpellCheckingInspection
services:

  pgAdmin:
    image: dpage/pgadmin4:latest
    container_name: papertrail-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - papertrail-network
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  valkey_insight:
    image: redis/redisinsight:latest
    container_name: papertrail-valkey-insight
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - papertrail-network
    ports:
      - "127.0.0.1:5540:5540"

volumes:
  pgadmin_data: