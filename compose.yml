#file: noinspection SpellCheckingInspection

x-defaults: &defaults
  cap_drop:
    - SYS_ADMIN
    - NET_RAW
    - SYS_PTRACE
    - MKNOD
    - AUDIT_WRITE
    - SYS_MODULE
  mem_limit: 512m
  restart: unless-stopped
  networks:
    - papertrail-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-readonly: &readonly
  read_only: true
  tmpfs:
    - /tmp

volumes:
  papertrail_database_data:
  papertrail_cache_data:

networks:
    papertrail-network:

services:

  database:
    <<: *defaults
    container_name: papertrail-database
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - papertrail_database_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    <<: *defaults
    container_name: papertrail-cache
    image: valkey/valkey:9.0.3-alpine3.23
    environment:
      VALKEY_PASSWORD: ${CACHE_PASSWORD}
    volumes:
      - papertrail_cache_data:/data
    command:
      - valkey-server
      - --protected-mode
      - "yes"
      - --port
      - "6379"
      - --dir
      - /data
      - --maxmemory
      - 384mb
      - --maxmemory-policy
      - allkeys-lru
      - --maxmemory-samples
      - "5"
      - --maxmemory-eviction-tenacity
      - "10"
      - --appendonly
      - "yes"
      - --appendfilename
      - "appendonly.aof"
      - --appenddirname
      - "appendonlydir"
      - --appendfsync
      - everysec
      - --save
      - 20 1
      - --requirepass
      - ${CACHE_PASSWORD}
    healthcheck:
      test: [ "CMD", "valkey-cli", "-a", "$$CACHE_PASSWORD", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  papertrail-api:
    <<: [*defaults, *readonly]
    container_name: papertrail-api
    image: ghcr.io/eggy03/papertrail-api:latest
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://database:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://default:${CACHE_PASSWORD}@cache:6379
      PORT: 8080 # you can remove this entirely since it will default to 8080 if not provided
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  papertrail-bot:
    <<: [*defaults, *readonly]
    container_name: papertrail-bot
    image: ghcr.io/eggy03/papertrail-bot:latest
    depends_on:
      papertrail-api:
        condition: service_healthy
    environment:
      TOKEN: ${TOKEN}
      API_URL: http://papertrail-api:8080